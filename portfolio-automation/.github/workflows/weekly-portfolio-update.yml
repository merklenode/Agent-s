name: Weekly portfolio update
on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build
        
      - name: Run weekly agent
        run: node dist/scripts/weekly-update.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: ${{ secrets.GITHUB_USER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LOCUSGRAPH_AGENT_SECRET: ${{ secrets.LOCUSGRAPH_AGENT_SECRET }}
          LOCUSGRAPH_SERVER_URL: ${{ secrets.LOCUSGRAPH_SERVER_URL }}
          GRAPH_ID: ${{ secrets.GRAPH_ID || 'default' }}
          
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit generated portfolio content (avoid accidentally committing unrelated files)
          mkdir -p content
          git add -A content/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: weekly portfolio update"
          git push
