name: Weekly OXE Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      GITHUB_TOKEN: ${{ secrets.OXE_GITHUB_TOKEN }}
      GITHUB_USER: ${{ secrets.GH_USER }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      LOCUSGRAPH_SERVER_URL: ${{ secrets.LOCUSGRAPH_SERVER_URL }}
      LOCUSGRAPH_AGENT_SECRET: ${{ secrets.LOCUSGRAPH_AGENT_SECRET }}
      LOCUSGRAPH_GRAPH_ID: ${{ secrets.LOCUSGRAPH_GRAPH_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm collect:github

      - run: pnpm generate:weekly

      - name: Commit generated content
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update weekly OXE content"
          file_pattern: "content/**"
