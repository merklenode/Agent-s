name: Monthly OXE Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 1 * *"

permissions:
  contents: write

jobs:
  monthly:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      GITHUB_TOKEN: ${{ secrets.OXE_GITHUB_TOKEN }}
      GITHUB_USER: ${{ secrets.GH_USER }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      LOCUSGRAPH_SERVER_URL: ${{ secrets.LOCUSGRAPH_SERVER_URL }}
      LOCUSGRAPH_AGENT_SECRET: ${{ secrets.LOCUSGRAPH_AGENT_SECRET }}
      LOCUSGRAPH_GRAPH_ID: ${{ secrets.LOCUSGRAPH_GRAPH_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm collect:github

      - run: pnpm generate:monthly

      - run: pnpm generate:resume

      - run: pnpm send:email

      - name: Commit generated content
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update monthly OXE content"
          file_pattern: "content/**"
